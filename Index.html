<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeginger Domains for Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Horizontal movement for Gingers */
        @keyframes moveRight {
            0% { left: -200px; transform: rotate(-20deg); }
            100% { left: 110vw; transform: rotate(360deg); }
        }

        /* Vertical bouncing for Gingers */
        @keyframes bounce {
            0%, 100% { bottom: 5%; animation-timing-function: ease-out; }
            50% { bottom: 45%; animation-timing-function: ease-in; }
        }

        /* Fast, aggressive movement for the Knife */
        @keyframes knifeMove {
            0% { left: -300px; transform: rotate(0deg); }
            100% { left: 120vw; transform: rotate(1080deg); /* Spins multiple times */ }
        }
        @keyframes knifeBounce {
            0%, 100% { bottom: 10%; animation-timing-function: ease-out; }
            50% { bottom: 60%; animation-timing-function: ease-in; }
        }

        .ginger-item {
            position: absolute;
            font-size: 6rem;
            line-height: 1;
            z-index: 0;
            filter: drop-shadow(0px 10px 8px rgba(0,0,0,0.4));
            /* The delays are set dynamically in JS */
        }

        .knife {
            position: absolute;
            font-size: 7rem;
            line-height: 1;
            z-index: 20;
            filter: drop-shadow(0px 15px 10px rgba(0,0,0,0.5));
            animation: 
                knifeMove 4s linear infinite, 
                knifeBounce 0.8s infinite alternate;
            display: none; /* Hidden until started */
        }

        /* Button pulse */
        @keyframes pulse-shadow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            50% { box-shadow: 0 0 20px 10px rgba(249, 115, 22, 0.2); }
        }
        .contact-btn { animation: pulse-shadow 2s infinite; }

        /* Full screen overlay */
        #start-overlay {
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-center items-center overflow-hidden font-sans relative">

    <!-- Start Overlay (Required to enable audio playback) -->
    <div id="start-overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/80">
        <button id="start-btn" class="px-8 py-4 bg-orange-500 hover:bg-orange-400 text-white font-bold rounded-2xl shadow-2xl text-2xl transition-transform hover:scale-110">
            Start the Madness 🎬
        </button>
    </div>

    <!-- The Jumping Knife -->
    <div id="the-knife" class="knife pointer-events-none select-none">🔪</div>

    <!-- Container for multiple gingers -->
    <div id="ginger-container" class="absolute inset-0 pointer-events-none select-none overflow-hidden hidden">
        <!-- Gingers are generated by JS -->
    </div>

    <!-- Main Content Card -->
    <div class="z-10 p-10 bg-slate-800 bg-opacity-70 rounded-3xl shadow-2xl border border-slate-700 backdrop-blur-md text-center max-w-2xl w-[90%] mt-8">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-6 text-orange-400 tracking-tight">
            Web Address Available For Sale
        </h1>
        
        <div class="bg-slate-900/50 p-6 rounded-2xl mb-8 border border-slate-700">
            <p class="text-sm uppercase tracking-widest text-slate-400 mb-4 font-semibold">Premium Domains</p>
            <div class="flex flex-col gap-3 text-2xl md:text-3xl font-mono text-white">
                <span class="hover:text-orange-400 transition-colors">Tradeginger.com</span>
                <span class="text-slate-500 hidden md:inline">|</span>
                <span class="hover:text-orange-400 transition-colors">Tradeginger.in</span>
            </div>
        </div>

        <div class="mt-4 pointer-events-auto">
            <p class="text-lg text-slate-300 mb-5">Interested in acquiring these domains?</p>
            <a href="mailto:tradegingersales@gmail.com" 
               class="contact-btn inline-block px-8 py-4 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-full transition-all duration-300 text-lg md:text-xl transform hover:scale-105">
                tradegingersales@gmail.com
            </a>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('start-overlay');
        const gingerContainer = document.getElementById('ginger-container');
        const knife = document.getElementById('the-knife');
        
        let isRunning = false;

        // Function to create multiple gingers with staggered animations
        function setupGingers() {
            const numberOfGingers = 4;
            for(let i = 0; i < numberOfGingers; i++) {
                const ginger = document.createElement('div');
                ginger.classList.add('ginger-item');
                
                // Randomize speeds and delays slightly for chaos
                const speed = 7 + Math.random() * 3;
                const bounceSpeed = 1 + Math.random() * 1;
                const delay = i * 2.5; 

                ginger.style.animation = `moveRight ${speed}s linear ${delay}s infinite, bounce ${bounceSpeed}s infinite alternate`;
                ginger.innerHTML = '🫚';
                gingerContainer.appendChild(ginger);

                // When the animation loops back to the left side, reset it if it was cut
                ginger.addEventListener('animationiteration', (e) => {
                    if (e.animationName === 'moveRight') {
                        ginger.classList.remove('cut');
                        ginger.innerHTML = '🫚';
                    }
                });
            }
        }

        // The "Wooohooo" sound effect using the browser's built-in speech synthesizer
        function playWoohoo() {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance("woo hoo");
            utterance.pitch = 1.8; // High pitched
            utterance.rate = 1.5;  // Fast
            window.speechSynthesis.speak(utterance);
        }

        // Collision detection loop
        function checkCollisions() {
            if (!isRunning) return;

            const knifeRect = knife.getBoundingClientRect();
            const gingers = document.querySelectorAll('.ginger-item:not(.cut)');

            gingers.forEach(ginger => {
                const rect = ginger.getBoundingClientRect();
                
                // Check if bounding boxes overlap
                if (!(knifeRect.right < rect.left || 
                      knifeRect.left > rect.right || 
                      knifeRect.bottom < rect.top || 
                      knifeRect.top > rect.bottom)) {
                    
                    // Collision occurred! 
                    ginger.classList.add('cut');
                    
                    // Visually split the ginger in half using Tailwind utility classes
                    ginger.innerHTML = `
                        <span class="inline-block transition-all duration-700 -translate-x-[100px] translate-y-[100px] -rotate-90 opacity-0 scale-50">🫚</span>
                        <span class="inline-block transition-all duration-700 translate-x-[100px] translate-y-[100px] rotate-90 opacity-0 scale-50">🫚</span>
                    `;
                    
                    playWoohoo();
                }
            });

            // Keep checking on the next animation frame
            requestAnimationFrame(checkCollisions);
        }

        // Start everything when the user clicks the button
        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            gingerContainer.style.display = 'block';
            knife.style.display = 'block';
            
            // A quick empty speech call to unlock audio context on mobile
            if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            setupGingers();
            isRunning = true;
            checkCollisions();
        });
    </script>
</body>
</html>
