<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Ginger | Exclusive Campus Internships</title>
    <meta name="description" content="Level up your career. Join the Trade Ginger exclusive network for college students and interns.">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
        }

        /* File Upload Styling */
        .file-upload-wrapper {
            text-align: left;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
        }

        .file-upload-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
            display: block;
        }

        input[type="file"] {
            padding: 0;
            background: transparent;
            border: none;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input[type="file"]::file-selector-button {
            background: #334155;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 15px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: #475569;
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(124, 58, 237, 0.7);
        }

        .footer-text {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">🚀 Limited Slots Available</div>
        <h1>Skip the Boring Internships.</h1>
        <p>Join the Trade Ginger network. Gain real experience, build your resume, and unlock exclusive perks.</p>

        <!-- FormSubmit Integration (Fix 2) -->
        <!-- enctype="multipart/form-data" is strictly required to send images/files -->
        <form action="https://formsubmit.co/tradegingersales@gmail.com" method="POST" enctype="multipart/form-data">
            
            <!-- Hidden configuration for a cleaner email format -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_subject" value="New Student Application (with Photo)">

            <input type="email" name="Email" placeholder="College Email Address" required>
            <input type="tel" name="Mobile" placeholder="WhatsApp Number" required>
            <input type="text" name="City" placeholder="Your City / Campus" required>
            
            <!-- New LinkedIn Field -->
            <input type="url" name="LinkedIn" placeholder="LinkedIn Profile URL (Optional)">
            
            <!-- New Photo Upload Field -->
            <div class="file-upload-wrapper">
                <label class="file-upload-label" for="photo">Upload Your Photo (Required)</label>
                <input type="file" id="photo" name="Photo" accept="image/png, image/jpeg, image/jpg" required>
            </div>
            
            <button type="submit">Claim Your Spot 🔥</button>
        </form>

        <p class="footer-text">Drop your details. We'll hit you up within 24 hours.</p>
    </div>

</body>
</html>
