<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Horizon - GOD MODE</title>
    
    <!-- Core Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

    <!-- Post-Processing -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/RGBShiftShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FilmShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/VignetteShader.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff0055;
            --neon-success: #00ff66;
            --neon-gold: #ffcc00;
            --hud-bg: rgba(0, 5, 10, 0.8);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
        }

        /* --- HUD --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; box-sizing: border-box;
        }

        /* Top Bar */
        .hud-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            width: 100%;
        }

        .hud-panel {
            background: linear-gradient(135deg, rgba(0,20,40,0.9), rgba(0,0,0,0.5));
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-left: 4px solid var(--neon-primary);
            padding: 15px;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
            backdrop-filter: blur(4px);
            min-width: 250px;
        }

        .panel-label {
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--neon-primary);
            letter-spacing: 2px; margin-bottom: 5px; display: block; opacity: 0.8;
        }

        .terminal-text {
            color: #d0f0ff; font-size: 0.9rem; line-height: 1.3;
            text-shadow: 0 0 5px rgba(0,243,255,0.5); min-height: 30px;
        }

        /* Status Bars */
        .bars-container { margin-top: 15px; }
        .bar-row { display: flex; align-items: center; margin-bottom: 8px; }
        .bar-icon { font-family: 'Orbitron'; font-size: 0.8rem; width: 60px; color: #fff; opacity: 0.7; }
        
        .bar-track {
            flex-grow: 1; height: 6px; background: rgba(255,255,255,0.1);
            transform: skewX(-20deg); overflow: hidden;
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s; box-shadow: 0 0 10px currentColor; }
        
        /* Stats */
        .stats-container { text-align: right; }
        .big-stat {
            font-family: 'Orbitron'; font-size: 4rem; font-weight: 900; line-height: 0.9;
            background: linear-gradient(180deg, #fff, var(--neon-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon-primary));
        }
        .sub-stat { font-size: 1rem; color: var(--neon-gold); letter-spacing: 2px; margin-top: 5px; }

        /* Center Stage */
        .stage-center {
            position: absolute; top: 80px; width: 100%; text-align: center;
            pointer-events: none;
        }
        .stage-text {
            font-family: 'Orbitron'; font-size: 2rem; color: #fff;
            text-shadow: 0 0 20px var(--neon-primary);
            letter-spacing: 8px; opacity: 0; transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stage-text.visible { opacity: 1; transform: scale(1); }

        /* Interaction */
        #boost-btn {
            position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px;
            border-radius: 50%; border: 2px solid var(--neon-gold);
            background: radial-gradient(circle, rgba(255,204,0,0.2), transparent);
            color: var(--neon-gold); font-family: 'Orbitron'; font-weight: bold; font-size: 1.2rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; opacity: 0.3; pointer-events: auto; transition: all 0.3s;
        }
        #boost-btn.ready { 
            opacity: 1; background: var(--neon-gold); color: #000; 
            box-shadow: 0 0 40px var(--neon-gold); animation: pulse 1s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Menu */
        #menu-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.5s;
        }
        
        .menu-card {
            background: rgba(5,10,20,0.9); border: 1px solid rgba(255,255,255,0.1);
            padding: 60px; text-align: center; position: relative;
            box-shadow: 0 0 100px rgba(0,243,255,0.15);
            max-width: 500px; width: 90%;
        }
        .menu-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-primary), transparent);
        }

        h1 {
            font-family: 'Orbitron'; font-size: 3.5rem; margin: 0 0 10px;
            background: linear-gradient(180deg, #fff, var(--neon-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
        }

        .menu-btn {
            background: transparent; border: 1px solid var(--neon-primary); color: var(--neon-primary);
            padding: 15px 40px; font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 3px;
            cursor: pointer; margin-top: 20px; transition: all 0.2s; width: 100%;
        }
        .menu-btn:hover { background: var(--neon-primary); color: #000; box-shadow: 0 0 30px var(--neon-primary); }
        .menu-btn.secondary { border-color: #666; color: #aaa; font-size: 1rem; padding: 10px; }
        .menu-btn.secondary:hover { border-color: #fff; color: #fff; box-shadow: none; background: rgba(255,255,255,0.1); }

        #screen-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; pointer-events: none; mix-blend-mode: overlay;
            transition: opacity 0.1s;
        }

        /* Hangar */
        #hangar-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 101; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .hangar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .hangar-slot {
            background: #111; border: 1px solid #333; padding: 15px; width: 120px; text-align: center;
            cursor: pointer; transition: all 0.2s;
        }
        .hangar-slot:hover { border-color: var(--neon-primary); transform: translateY(-3px); }
        .hangar-slot.equipped { border-color: var(--neon-gold); box-shadow: 0 0 15px rgba(255,204,0,0.3); }

        .hidden { opacity: 0; pointer-events: none; }
        .d-none { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container"></div>
    <div id="screen-flash"></div>

    <div id="ui-layer">
        <div class="hud-top">
            <!-- Left Panel: Ship Status -->
            <div class="hud-panel">
                <span class="panel-label" id="op-name">OP: GENESIS</span>
                <div id="ai-log" class="terminal-text">System initializing...</div>
                
                <div class="bars-container">
                    <div class="bar-row">
                        <span class="bar-icon">HULL</span>
                        <div class="bar-track">
                            <div id="hp-bar" class="bar-fill" style="width: 100%; background: var(--neon-secondary); color: var(--neon-secondary);"></div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="bar-icon">WARP</span>
                        <div class="bar-track">
                            <div id="warp-bar" class="bar-fill" style="width: 0%; background: var(--neon-gold); color: var(--neon-gold);"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Stats -->
            <div class="stats-container">
                <div class="hud-panel" style="border-left:none; border-right:4px solid var(--neon-primary); text-align:right;">
                    <span class="panel-label">DISTANCE</span>
                    <div id="score-display" class="big-stat">0000</div>
                    <div class="sub-stat">CREDITS: <span id="credits-display">0</span></div>
                </div>
            </div>
        </div>

        <div class="stage-center">
            <div id="stage-text" class="stage-text">NEON RIM</div>
        </div>

        <div id="boost-btn">WARP</div>
    </div>

    <!-- Main Menu -->
    <div id="menu-layer">
        <div class="menu-card">
            <h1>NEON HORIZON</h1>
            <div style="color: #888; font-size: 0.9rem; letter-spacing: 3px; margin-bottom: 30px;">GOD MODE EDITION</div>
            
            <div style="display:flex; justify-content:space-around; margin-bottom:30px; border-bottom:1px solid #333; padding-bottom:20px;">
                <div>
                    <div style="font-size:0.8rem; color:#666;">HIGH SCORE</div>
                    <div id="menu-best" style="font-size:1.5rem; color:#fff;">0</div>
                </div>
                <div>
                    <div style="font-size:0.8rem; color:#666;">CREDITS</div>
                    <div id="menu-credits" style="font-size:1.5rem; color:var(--neon-gold);">0</div>
                </div>
            </div>

            <button class="menu-btn" id="btn-start">INITIATE LAUNCH</button>
            <button class="menu-btn secondary" id="btn-hangar">HANGAR</button>
            
            <div id="mission-brief" style="margin-top:30px; font-size:0.8rem; color:#666; font-style:italic; min-height: 40px;">
                Connecting to Neural Net...
            </div>
        </div>
    </div>

    <!-- Hangar -->
    <div id="hangar-layer">
        <h1 style="font-size:2.5rem;">HANGAR</h1>
        <div style="color:var(--neon-gold); margin-bottom:20px;">CREDITS: <span id="hangar-credits">0</span></div>
        
        <div class="hangar-grid" id="hangar-grid"></div>
        <div id="hangar-desc" style="color:#888; font-style:italic; max-width:400px; text-align:center;"></div>
        
        <button class="menu-btn secondary" id="btn-back" style="width:auto; margin-top:40px;">BACK</button>
    </div>

    <!-- Shaders -->
    <script id="sun-vertex" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>
    <script id="sun-fragment" type="x-shader/x-fragment">
        uniform float time;
        uniform vec3 color;
        varying vec2 vUv;

        void main() {
            vec2 p = vUv * 2.0 - 1.0;
            float dist = length(p);
            float alpha = 1.0 - smoothstep(0.9, 1.0, dist);
            
            // Scanlines
            float scanline = sin(p.y * 50.0 - time * 3.0);
            if (p.y < 0.0) {
                if (scanline > 0.3) discard;
            }
            
            // Inner glow
            float glow = 1.0 - dist;
            vec3 finalColor = mix(color * 0.8, vec3(1.0, 0.9, 0.5), glow * 0.5);
            finalColor += vec3(0.1, 0.0, 0.2); // deep purple tint
            
            gl_FragColor = vec4(finalColor * 1.5, alpha);
        }
    </script>

    <script>
        /**
         * NEON HORIZON: GOD MODE
         * Features: Synthwave Valley Terrain, Pulsing Sun, Cinematic Post-Processing
         */

        // --- CONSTANTS & CONFIG ---
        const CONFIG = {
            width: 80,
            speed: 1.5,
            colors: {
                blue: 0x00f3ff,
                pink: 0xff0055,
                orange: 0xffaa00,
                gold: 0xffcc00
            }
        };

        const SHOP = [
            { id: 'skin_default', name: 'Prototype 01', type: 'skin', price: 0, color: 0xffffff },
            { id: 'skin_stealth', name: 'Vantablack', type: 'skin', price: 1000, color: 0x111111 },
            { id: 'skin_gold', name: 'Prestige', type: 'skin', price: 2500, color: 0xffaa00 },
            { id: 'trail_ion', name: 'Ion Stream', type: 'trail', price: 0, color: 0x00f3ff },
            { id: 'trail_plasma', name: 'Plasma Heat', type: 'trail', price: 1500, color: 0xff0055 }
        ];

        // --- STATE ---
        let state = {
            active: false,
            score: 0,
            credits: 0,
            highScore: 0,
            health: 100,
            warp: 0,
            speed: CONFIG.speed,
            isWarping: false,
            stage: 0,
            frame: 0,
            inventory: ['skin_default', 'trail_ion'],
            equipped: { skin: 'skin_default', trail: 'trail_ion' },
            inputX: 0
        };

        // --- THREE.JS ---
        let scene, camera, renderer, composer;
        let player, sun, terrain, terrain2;
        let asteroids = [], collectibles = [], debrisInstanced;
        let rgbPass, bloomPass, filmPass;
        let dummy = new THREE.Object3D(); // For instancing
        let simplex = new SimplexNoise();

        // --- UI REFS ---
        const ui = {
            hp: document.getElementById('hp-bar'),
            warp: document.getElementById('warp-bar'),
            score: document.getElementById('score-display'),
            credits: document.getElementById('credits-display'),
            log: document.getElementById('ai-log'),
            stage: document.getElementById('stage-text'),
            menu: document.getElementById('menu-layer'),
            hangar: document.getElementById('hangar-layer'),
            flash: document.getElementById('screen-flash'),
            boost: document.getElementById('boost-btn')
        };

        // --- API & DATA ---
        const apiKey = ""; 

        async function callAI(prompt, type) {
            if(!apiKey) return getDefaultText(type);
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || getDefaultText(type);
            } catch(e) { return getDefaultText(type); }
        }

        function getDefaultText(type) {
            const defaults = {
                mission: "Objective: Reach the event horizon.",
                crash: "Signal Lost.",
                chatter: "System Nominal.",
                desc: "Standard issue hardware."
            };
            return defaults[type] || "";
        }

        // --- SETUP ---
        function init() {
            loadData();
            
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000510, 0.012); // Slightly clearer for distant mountains

            // Camera
            camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 2000);
            camera.position.set(0, 4, 10);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Post-Processing
            setupPostProcessing();

            // World
            setupLighting();
            createSun();
            createSynthwaveTerrain();
            createDebrisField();
            createPlayer();

            // Listeners
            window.addEventListener('resize', onResize);
            document.addEventListener('mousemove', e => {
                if(!state.active) return;
                const tx = ((e.clientX / window.innerWidth) * 2 - 1) * 45;
                state.inputX = (tx - player.position.x) * 0.1;
                player.position.x += state.inputX;
            });
            document.addEventListener('touchmove', e => {
                e.preventDefault();
                if(!state.active) return;
                const tx = ((e.touches[0].clientX / window.innerWidth) * 2 - 1) * 45;
                state.inputX = (tx - player.position.x) * 0.1;
                player.position.x += state.inputX;
            }, {passive:false});
            document.addEventListener('keydown', e => {
                if(e.code === 'Space') {
                    if(state.active) triggerWarp();
                    else if(!ui.menu.classList.contains('d-none')) startGame();
                }
            });

            // UI
            document.getElementById('btn-start').onclick = startGame;
            document.getElementById('btn-hangar').onclick = openHangar;
            document.getElementById('btn-back').onclick = closeHangar;
            ui.boost.onclick = triggerWarp;

            // Start Loop
            requestAnimationFrame(animate);
            generateMissionBrief();
        }

        function setupPostProcessing() {
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));

            // Bloom
            bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.15;
            bloomPass.strength = 2.2; // Extra glow
            bloomPass.radius = 0.5;
            composer.addPass(bloomPass);

            // RGB Shift
            rgbPass = new THREE.ShaderPass(THREE.RGBShiftShader);
            rgbPass.uniforms['amount'].value = 0.0015;
            composer.addPass(rgbPass);

            // Film Grain
            filmPass = new THREE.ShaderPass(THREE.FilmShader);
            filmPass.uniforms['nIntensity'].value = 0.3;
            filmPass.uniforms['sIntensity'].value = 0.05;
            filmPass.uniforms['grayscale'].value = 0;
            composer.addPass(filmPass);
            
            // Vignette
            const vigPass = new THREE.ShaderPass(THREE.VignetteShader);
            vigPass.uniforms['offset'].value = 1.0;
            vigPass.uniforms['darkness'].value = 1.2;
            composer.addPass(vigPass);
        }

        function setupLighting() {
            const ambient = new THREE.AmbientLight(0x404040, 1.0); 
            scene.add(ambient);
            
            const dir = new THREE.DirectionalLight(0xffffff, 1.0);
            dir.position.set(20, 50, 20);
            dir.castShadow = true;
            dir.shadow.mapSize.width = 1024;
            dir.shadow.mapSize.height = 1024;
            scene.add(dir);

            const rim = new THREE.SpotLight(CONFIG.colors.blue, 5);
            rim.position.set(0, 10, 5);
            rim.lookAt(0,0,0);
            scene.add(rim);
        }

        // --- OBJECT CREATION ---
        function createSun() {
            const geo = new THREE.PlaneGeometry(350, 350);
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    color: { value: new THREE.Color(CONFIG.colors.pink) }
                },
                vertexShader: document.getElementById('sun-vertex').textContent,
                fragmentShader: document.getElementById('sun-fragment').textContent,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            sun = new THREE.Mesh(geo, mat);
            sun.position.set(0, 40, -400);
            scene.add(sun);
        }

        function createSynthwaveTerrain() {
            // Create two terrain meshes for infinite scrolling
            const geometry = new THREE.PlaneGeometry(400, 400, 60, 60);
            
            // Displace vertices to make a valley
            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                
                // Calculate distance from center (road)
                const dist = Math.abs(x);
                
                // Flat road in middle (width approx 40), then rise up
                let height = 0;
                if (dist > 30) {
                    // Noise based mountains
                    // Use simple math for speed instead of simplex for static mesh generation if preferred, 
                    // but here we use simplex for natural look.
                    // Since simplex is not seeded here, it might vary, but that's fine.
                    // We need consistent noise if we want them to tile perfectly, 
                    // but for this effect, hiding the seam with fog is usually enough.
                    const y = pos.getY(i);
                    const noise = simplex.noise2D(x * 0.02, y * 0.02);
                    height = (dist - 30) * 1.5 + noise * 20;
                }
                
                pos.setZ(i, height); // Z becomes Y after rotation
            }
            geometry.computeVertexNormals();

            const material = new THREE.MeshBasicMaterial({ 
                color: CONFIG.colors.blue, 
                wireframe: true,
                transparent: true,
                opacity: 0.3
            });

            terrain = new THREE.Mesh(geometry, material);
            terrain.rotation.x = -Math.PI / 2;
            terrain.position.y = -10;
            terrain.position.z = 0;
            scene.add(terrain);
            
            terrain2 = terrain.clone();
            terrain2.position.z = -400; 
            scene.add(terrain2);
        }

        function createDebrisField() {
            const count = 3000;
            const geo = new THREE.TetrahedronGeometry(0.5, 0);
            const mat = new THREE.MeshBasicMaterial({ color: 0x888888, wireframe: true });
            debrisInstanced = new THREE.InstancedMesh(geo, mat, count);
            
            for(let i=0; i<count; i++) {
                dummy.position.set(
                    (Math.random()-0.5) * 600,
                    (Math.random()-0.5) * 200 + 50,
                    (Math.random()-0.5) * 1000 - 200
                );
                dummy.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                dummy.scale.setScalar(Math.random() * 2);
                dummy.updateMatrix();
                debrisInstanced.setMatrixAt(i, dummy.matrix);
            }
            scene.add(debrisInstanced);
        }

        function createPlayer() {
            if(player) scene.remove(player);
            player = new THREE.Group();

            const skinHex = SHOP.find(i => i.id === state.equipped.skin)?.color || 0xffffff;
            
            // Materials
            const hullMat = new THREE.MeshPhysicalMaterial({
                color: skinHex, roughness: 0.2, metalness: 0.8,
                clearcoat: 1.0, emissive: skinHex, emissiveIntensity: 0.1
            });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0x000000, metalness: 1, roughness: 0, opacity: 0.8, transparent: true
            });

            // Model
            const body = new THREE.Mesh(new THREE.ConeGeometry(1, 6, 8), hullMat);
            body.rotation.x = Math.PI/2;
            body.castShadow = true;
            player.add(body);

            const engine = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 1.5), darkMat);
            engine.position.set(0, 0, 2.5);
            player.add(engine);

            const wingGeo = new THREE.BoxGeometry(6, 0.1, 3);
            const wings = new THREE.Mesh(wingGeo, hullMat);
            wings.position.set(0, 0, 2);
            player.add(wings);

            const stabGeo = new THREE.BoxGeometry(0.2, 2, 2);
            const stab1 = new THREE.Mesh(stabGeo, hullMat);
            stab1.position.set(-1.5, 0.5, 2.5);
            stab1.rotation.z = 0.5;
            player.add(stab1);
            const stab2 = stab1.clone();
            stab2.position.set(1.5, 0.5, 2.5);
            stab2.rotation.z = -0.5;
            player.add(stab2);

            const cock = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 2), glassMat);
            cock.position.set(0, 0.5, 0);
            player.add(cock);

            const light = new THREE.PointLight(CONFIG.colors.blue, 2, 10);
            light.position.set(0, 0, 3.5);
            player.add(light);

            scene.add(player);
            player.position.y = 0;
            player.position.z = 6;
        }

        function spawnAsteroid() {
            const geo = new THREE.IcosahedronGeometry(Math.random()*1.5 + 1, 0);
            const mat = new THREE.MeshStandardMaterial({ color: 0x333333, flatShading: true, roughness: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.position.set((Math.random()-0.5)*CONFIG.width, Math.random()*4, -300);
            mesh.castShadow = true;
            mesh.userData = { type: 'rock', rot: new THREE.Vector3(Math.random()*0.1, Math.random()*0.1, 0) };
            
            scene.add(mesh);
            asteroids.push(mesh);
        }

        function spawnCoin() {
            const geo = new THREE.OctahedronGeometry(1);
            const mat = new THREE.MeshBasicMaterial({ color: CONFIG.colors.gold });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.random()-0.5)*CONFIG.width, Math.random()*3, -300);
            mesh.userData = { type: 'gold', rot: 0.05 };
            
            const light = new THREE.PointLight(CONFIG.colors.gold, 1, 8);
            mesh.add(light);
            
            scene.add(mesh);
            collectibles.push(mesh);
        }

        // --- GAME LOGIC ---
        function startGame() {
            state.active = true;
            state.score = 0;
            state.health = 100;
            state.warp = 0;
            state.speed = CONFIG.speed;
            state.isWarping = false;
            
            // Clear old
            asteroids.forEach(a => scene.remove(a));
            collectibles.forEach(c => scene.remove(c));
            asteroids = []; collectibles = [];

            ui.menu.classList.add('d-none');
            updateUI();
            
            logAI("Engines Ignited. Good luck.");
            
            camera.position.z = 20;
            new TWEEN(camera.position, 'z', 10, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            state.frame++;

            const dt = 0.016; 
            const speed = state.isWarping ? state.speed * 3 : state.speed;

            if(state.active) {
                state.score += Math.round(speed); // Base speed score
                if(state.score % 2000 < 50 && state.score > 100) triggerStageUpdate();

                // Scroll Terrain
                if(terrain && terrain2) {
                    terrain.position.z += speed;
                    terrain2.position.z += speed;
                    if(terrain.position.z > 400) terrain.position.z = terrain2.position.z - 400;
                    if(terrain2.position.z > 400) terrain2.position.z = terrain.position.z - 400;
                }

                sun.material.uniforms.time.value += dt;
                
                // Ship Physics
                player.rotation.z += (-player.position.x * 0.03 - player.rotation.z) * 0.1;
                player.position.y = Math.sin(state.frame * 0.05) * 0.5; 

                // Camera Shake
                const shake = state.isWarping ? 0.3 : (speed > 2 ? 0.1 : 0);
                camera.position.x += (Math.random()-0.5)*shake;
                camera.position.y = 4 + (Math.random()-0.5)*shake;

                // Spawning
                if(state.frame % 30 === 0) spawnAsteroid();
                if(state.frame % 100 === 0) spawnCoin();

                updateEntities(speed);
                
                // Warp Logic
                if(state.isWarping) {
                    state.warp -= 0.5;
                    if(state.warp <= 0) endWarp();
                    rgbPass.uniforms['amount'].value = 0.005;
                } else {
                    rgbPass.uniforms['amount'].value = 0.0015 + (state.speed * 0.0005);
                }
            } else {
                if(player) player.rotation.y += 0.005;
            }

            updateUI();
            composer.render();
        }

        function updateEntities(speed) {
            // Asteroids
            for(let i=asteroids.length-1; i>=0; i--) {
                let a = asteroids[i];
                a.position.z += speed * 1.5;
                a.rotation.x += a.userData.rot.x;
                a.rotation.y += a.userData.rot.y;

                // Collision
                if(a.position.z > 2 && a.position.z < 8) {
                    if(player.position.distanceTo(a.position) < 4) hitObstacle(a);
                }
                if(a.position.z > 20) { scene.remove(a); asteroids.splice(i,1); }
            }

            // Coins
            for(let i=collectibles.length-1; i>=0; i--) {
                let c = collectibles[i];
                c.position.z += speed * 1.5;
                c.rotation.y += 0.1;
                
                if(c.position.z > 2 && c.position.z < 8) {
                    if(player.position.distanceTo(c.position) < 4) collect(c);
                }
                if(c.position.z > 20) { scene.remove(c); collectibles.splice(i,1); }
            }
        }

        function hitObstacle(obj) {
            if(state.isWarping) {
                createExplosion(obj.position, CONFIG.colors.gold);
                scene.remove(obj);
                asteroids.splice(asteroids.indexOf(obj), 1);
                state.score += 500;
                logAI("Obstacle Obliterated.");
                return;
            }

            createExplosion(player.position, CONFIG.colors.secondary);
            state.health -= 20;
            state.speed = CONFIG.speed; // Reset speed
            
            ui.flash.style.opacity = 0.8;
            setTimeout(() => ui.flash.style.opacity = 0, 100);

            scene.remove(obj);
            asteroids.splice(asteroids.indexOf(obj), 1);

            if(state.health <= 0) gameOver();
            else logAI("WARNING: Hull Damage Detected.");
        }

        function collect(obj) {
            state.score += 200;
            state.credits += 10;
            state.warp = Math.min(100, state.warp + 15);
            
            scene.remove(obj);
            collectibles.splice(collectibles.indexOf(obj), 1);
            
            if(state.warp >= 100 && !state.isWarping) {
                ui.boost.classList.add('ready');
                logAI("Warp Drive Charged.");
            }
        }

        function triggerWarp() {
            if(state.warp >= 100) {
                state.isWarping = true;
                ui.boost.classList.remove('ready');
                logAI("WARP ENGAGED.");
                new TWEEN(camera, 'fov', 110, 500);
            }
        }

        function endWarp() {
            state.isWarping = false;
            logAI("Dropping from Warp.");
            new TWEEN(camera, 'fov', 80, 500);
        }

        function triggerStageUpdate() {
            const stages = ["NEON RIM", "SOLAR FLARE", "DEEP VOID", "CYBER CORE"];
            const stageName = stages[Math.floor(Math.random()*stages.length)];
            ui.stage.innerText = stageName;
            ui.stage.classList.add('visible');
            setTimeout(() => ui.stage.classList.remove('visible'), 2000);
            
            state.speed += 0.1;
            logAI(`Entering Sector: ${stageName}`);
        }

        function gameOver() {
            state.active = false;
            if(state.score > state.highScore) state.highScore = state.score;
            saveData();
            
            document.getElementById('menu-best').innerText = state.highScore;
            document.getElementById('menu-credits').innerText = state.credits;
            ui.menu.classList.remove('d-none');
            
            callAI(`Player died at score ${state.score}. Give a sarcastic sci-fi failure message.`, 'crash').then(t => document.getElementById('mission-brief').innerText = t);
        }

        // --- DATA ---
        function saveData() {
            localStorage.setItem('neon_god_save', JSON.stringify({
                credits: state.credits, high: state.highScore, inv: state.inventory, eq: state.equipped
            }));
        }
        function loadData() {
            const d = JSON.parse(localStorage.getItem('neon_god_save'));
            if(d) {
                state.credits = d.credits;
                state.highScore = d.high;
                state.inventory = d.inv;
                state.equipped = d.eq;
            }
            updateMenuStats();
        }
        function updateMenuStats() {
            document.getElementById('menu-best').innerText = state.highScore;
            document.getElementById('menu-credits').innerText = state.credits;
            document.getElementById('hangar-credits').innerText = state.credits;
        }

        // --- HANGAR ---
        function openHangar() {
            ui.menu.classList.add('d-none');
            ui.hangar.style.display = 'flex';
            const grid = document.getElementById('hangar-grid');
            grid.innerHTML = '';
            
            SHOP.forEach(item => {
                const el = document.createElement('div');
                el.className = `hangar-slot ${state.equipped[item.type] === item.id ? 'equipped' : ''}`;
                const owned = state.inventory.includes(item.id);
                el.style.borderColor = owned ? (state.equipped[item.type] === item.id ? 'var(--neon-gold)' : '#555') : '#333';
                
                el.innerHTML = `
                    <div style="font-size:0.8rem; margin-bottom:5px;">${item.name}</div>
                    <div style="width:100%; height:30px; background:#${item.color.toString(16)}; margin-bottom:5px;"></div>
                    <div style="font-size:0.7rem; color:${owned ? '#0f0' : 'var(--neon-gold)'}">${owned ? 'OWNED' : item.price}</div>
                `;
                el.onclick = () => {
                    if(owned) {
                        state.equipped[item.type] = item.id;
                        saveData();
                        openHangar(); 
                        if(player) createPlayer(); 
                    } else if(state.credits >= item.price) {
                        state.credits -= item.price;
                        state.inventory.push(item.id);
                        state.equipped[item.type] = item.id;
                        saveData();
                        openHangar();
                        if(player) createPlayer();
                    }
                    
                    document.getElementById('hangar-desc').innerText = "Scanning...";
                    callAI(`Write a cool sci-fi tech description for a ship part named ${item.name}.`, 'desc').then(t => document.getElementById('hangar-desc').innerText = t);
                };
                grid.appendChild(el);
            });
        }
        function closeHangar() {
            ui.hangar.style.display = 'none';
            ui.menu.classList.remove('d-none');
        }

        // --- UTILS ---
        function logAI(text) {
            ui.log.innerText = text;
        }
        function updateUI() {
            ui.hp.style.width = state.health + "%";
            ui.hp.style.background = state.health < 30 ? 'red' : 'var(--neon-secondary)';
            ui.warp.style.width = state.warp + "%";
            ui.score.innerText = state.score.toString().padStart(6,'0');
            ui.credits.innerText = state.credits;
        }
        function createExplosion(pos, color) {
            const count = 10;
            const geo = new THREE.BoxGeometry(0.5,0.5,0.5);
            const mat = new THREE.MeshBasicMaterial({color:color});
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                scene.add(p);
                const dest = new THREE.Vector3(
                    pos.x + (Math.random()-0.5)*10,
                    pos.y + (Math.random()-0.5)*10,
                    pos.z + (Math.random()-0.5)*10
                );
                new TWEEN(p.position, 'x', dest.x, 500);
                new TWEEN(p.position, 'y', dest.y, 500);
                new TWEEN(p.position, 'z', dest.z, 500, () => scene.remove(p));
            }
        }
        
        class TWEEN {
            constructor(obj, prop, target, duration, onComplete) {
                const start = obj[prop];
                const startTime = Date.now();
                const loop = () => {
                    const elapsed = Date.now() - startTime;
                    const p = Math.min(elapsed/duration, 1);
                    obj[prop] = start + (target - start) * (1 - Math.pow(1-p, 3));
                    if(p < 1) requestAnimationFrame(loop);
                    else if(onComplete) onComplete();
                };
                loop();
            }
        }

        async function generateMissionBrief() {
            const t = await callAI("Generate a cool military sci-fi operation name.", "mission");
            document.getElementById('op-name').innerText = t;
        }

        function onResize() {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
