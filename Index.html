<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeginger Domains for Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Horizontal movement for Gingers */
        @keyframes moveRight {
            0% { left: -200px; transform: rotate(-10deg); }
            100% { left: 110vw; transform: rotate(360deg); }
        }

        /* Vertical bouncing for Gingers */
        @keyframes bounce {
            0%, 100% { bottom: 10%; animation-timing-function: ease-out; }
            50% { bottom: 70%; animation-timing-function: ease-in; }
        }

        /* Fast, aggressive movement for the Knife */
        @keyframes knifeMove {
            0% { left: -300px; transform: rotate(0deg); }
            100% { left: 120vw; transform: rotate(1080deg); }
        }
        @keyframes knifeBounce {
            0%, 100% { bottom: 15%; animation-timing-function: ease-out; }
            50% { bottom: 75%; animation-timing-function: ease-in; }
        }

        /* The Knife */
        .knife {
            position: absolute;
            font-size: 8rem;
            line-height: 1;
            z-index: 60; /* Knife is on top of everything */
            filter: drop-shadow(0px 15px 10px rgba(0,0,0,0.5));
            animation: 
                knifeMove 3.5s linear infinite, 
                knifeBounce 0.7s infinite alternate;
            display: none; 
        }

        /* Ginger Container */
        .ginger-wrapper {
            position: absolute;
            width: 100px;
            height: 100px;
            z-index: 50; /* Brought to the absolute front */
            /* Animations applied via JS */
        }

        /* The TRUE Slicing Effect using clip-path */
        .ginger-half {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 7rem;
            line-height: 1;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0px 10px 8px rgba(0,0,0,0.4));
        }

        /* Left Half of the Emoji */
        .ginger-left {
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0% 100%);
        }

        /* Right Half of the Emoji */
        .ginger-right {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        /* When the 'cut' class is added, split them apart! */
        .ginger-wrapper.cut .ginger-left {
            transform: translateX(-60px) translateY(80px) rotate(-45deg);
            opacity: 0;
        }
        .ginger-wrapper.cut .ginger-right {
            transform: translateX(60px) translateY(80px) rotate(45deg);
            opacity: 0;
        }

        /* Button pulse */
        @keyframes pulse-shadow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            50% { box-shadow: 0 0 20px 10px rgba(249, 115, 22, 0.2); }
        }
        .contact-btn { animation: pulse-shadow 2s infinite; }

        #start-overlay { backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-center items-center overflow-hidden font-sans relative">

    <div id="start-overlay" class="absolute inset-0 z-[100] flex items-center justify-center bg-slate-900/90">
        <button id="start-btn" class="px-8 py-4 bg-orange-500 hover:bg-orange-400 text-white font-bold rounded-2xl shadow-2xl text-2xl transition-transform hover:scale-110">
            Start the Madness 🎬
        </button>
    </div>

    <div id="the-knife" class="knife pointer-events-none select-none">🔪</div>

    <div id="ginger-container" class="absolute inset-0 pointer-events-none select-none hidden">
        </div>

    <div class="z-10 p-10 bg-slate-800 bg-opacity-70 rounded-3xl shadow-2xl border border-slate-700 backdrop-blur-md text-center max-w-2xl w-[90%]">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-6 text-orange-400 tracking-tight">
            Web Address Available For Sale
        </h1>
        
        <div class="bg-slate-900/50 p-6 rounded-2xl mb-8 border border-slate-700">
            <p class="text-sm uppercase tracking-widest text-slate-400 mb-4 font-semibold">Premium Domains</p>
            <div class="flex flex-col gap-3 text-2xl md:text-3xl font-mono text-white">
                <span class="hover:text-orange-400 transition-colors">Tradeginger.com</span>
                <span class="text-slate-500 hidden md:inline">|</span>
                <span class="hover:text-orange-400 transition-colors">Tradeginger.in</span>
            </div>
        </div>

        <div class="mt-4 pointer-events-auto">
            <p class="text-lg text-slate-300 mb-5">Interested in acquiring these domains?</p>
            <a href="mailto:tradegingersales@gmail.com" 
               class="contact-btn inline-block px-8 py-4 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-full transition-all duration-300 text-lg md:text-xl transform hover:scale-105">
                tradegingersales@gmail.com
            </a>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('start-overlay');
        const gingerContainer = document.getElementById('ginger-container');
        const knife = document.getElementById('the-knife');
        
        let isRunning = false;

        function setupGingers() {
            const numberOfGingers = 5; // Added an extra ginger for more chaos!
            
            for(let i = 0; i < numberOfGingers; i++) {
                const ginger = document.createElement('div');
                ginger.classList.add('ginger-wrapper');
                
                const speed = 5 + Math.random() * 4; 
                const bounceSpeed = 0.8 + Math.random() * 0.7;
                const delay = i * 1.8; 

                ginger.style.animation = `moveRight ${speed}s linear ${delay}s infinite, bounce ${bounceSpeed}s infinite alternate`;
                
                // Build the ginger out of two perfectly sliced halves
                ginger.innerHTML = `
                    <div class="ginger-half ginger-left">🫚</div>
                    <div class="ginger-half ginger-right">🫚</div>
                `;
                
                gingerContainer.appendChild(ginger);

                // Reset the slice effect when it loops back off screen
                ginger.addEventListener('animationiteration', (e) => {
                    if (e.animationName === 'moveRight') {
                        ginger.classList.remove('cut');
                    }
                });
            }
        }

        function playWoohoo() {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance("woo hoo");
            utterance.pitch = 2.0; 
            utterance.rate = 1.8;  
            window.speechSynthesis.speak(utterance);
        }

        function checkCollisions() {
            if (!isRunning) return;

            const knifeRect = knife.getBoundingClientRect();
            // Only look for gingers that haven't been cut yet
            const gingers = document.querySelectorAll('.ginger-wrapper:not(.cut)');

            gingers.forEach(ginger => {
                const rect = ginger.getBoundingClientRect();
                
                // Give it a slightly smaller hitbox so the knife really has to touch it
                const hitboxBuffer = 20; 

                if (!(knifeRect.right < rect.left + hitboxBuffer || 
                      knifeRect.left > rect.right - hitboxBuffer || 
                      knifeRect.bottom < rect.top + hitboxBuffer || 
                      knifeRect.top > rect.bottom - hitboxBuffer)) {
                    
                    // Slice it!
                    ginger.classList.add('cut');
                    playWoohoo();
                }
            });

            requestAnimationFrame(checkCollisions);
        }

        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            gingerContainer.style.display = 'block';
            knife.style.display = 'block';
            
            if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            setupGingers();
            isRunning = true;
            checkCollisions();
        });
    </script>
</body>
</html>
